{% extends 'student.html' %}

{% block content %}
<style>
.full-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}
.full-card h2{
    margin-bottom:15px;
}
.empty{
    text-align:center;
    padding:20px;
    color:#555;
}
</style>

<div class="full-card">
    <h2>Leave History</h2>
    <table>
        <tr>
            <th>From</th>
            <th>To</th>
            <th>Reason</th>
            <th>Final Status</th>
        </tr>

        {% for leave in history %}
        <tr>
            <td>{{ leave.from_date }}</td>
            <td>{{ leave.to_date }}</td>
            <td>{{ leave.reason }}</td>
            <td>{{ leave.status }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="empty">No history found</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock content %}
