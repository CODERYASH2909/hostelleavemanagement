<!DOCTYPE html>
<html>
<head>
    <title>Leave History</title>
    <style>
        body{font-family:Arial;background:#f8fafc;padding:30px;}
        table{width:100%;border-collapse:collapse;background:white;}
        th,td{padding:12px;border-bottom:1px solid #ddd;}
        th{background:#1e293b;color:white;}
    </style>
</head>
<body>

<h2>Leave History</h2>

<table>
<tr>
    <th>From</th>
    <th>To</th>
    <th>Reason</th>
    <th>Final Status</th>
</tr>

{% for leave in history %}
<tr>
    <td>{{ leave.from_date }}</td>
    <td>{{ leave.to_date }}</td>
    <td>{{ leave.reason }}</td>
    <td>{{ leave.status }}</td>
</tr>
{% empty %}
<tr><td colspan="4">No history found</td></tr>
{% endfor %}

</table>

</body>
</html>
