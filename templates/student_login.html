{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
 
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: rgb(5, 5, 5);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),url("{% static 'images/guni_campus.png' %}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;        }

        .login-container {
            background: white;
            width: 350px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1e40af;
        }

        .signup-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #7d6666;
        }

        .signup-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;  
            padding: 3px 6px;
            border-radius: 4px;
        }

        .signup-link a:hover {
            color: #ffffff;
            background-color: #2563eb;        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Student Login</h2>

        <form method="POST" action="{% url 'student_login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your Enrollment number" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>
<!-- sign up -->
        <div class="signup-link">
            Don't have an account?
            <a href="{% url 'student_signup' %}">Sign Up</a>
        </div>

    </div>

</body>

</html>
