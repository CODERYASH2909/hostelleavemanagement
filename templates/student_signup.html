{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: rgb(0, 0, 0);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),url("{% static 'images/guni_campus.png' %}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            padding: 20px;
        }

        .signup-container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .signup-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1e40af;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #7d6666;
        }

        .login-link a {
            color: #2563eb;              
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;  
            padding: 3px 6px;
            border-radius: 4px;
        }

        .login-link a:hover {
            color: #ffffff;
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Student Sign Up</h2>
<!--Form-->
        <form method="POST" action="{% url 'student_signup' %}">
    {% csrf_token %}

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Enter Full Name" required>            </div>

            <div class="input-group">
                <label>Enrollment Number</label>
                <input type="text" name="enrollment_no" placeholder="Enter Enrollment number" maxlength="11" pattern="\d{11}" title="Enrollment number must be exactly 11 digits" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="input-group">
                <label>Hostel Block</label>
                <select name="hostel_block" required>
                    <option value="" selected disabled>--Select Block--</option>
                    <option>Hostel Block A</option>
                    <option>Hostel Block B</option>
                    <option>Hostel Block C</option>
                    <option>Hostel Block D</option>
                    <option>Hostel Block E</option>
                    <option>Hostel Block F</option>
                    <option>Hostel Block G</option>
                    <option>Hostel Block H</option>
                    <option>Girls Executive</option>
                    <option>Marine Hostel</option>
                    <option>Chanakya Hostel</option>
                    <option>Vishwa Hostel</option>
                </select>
            </div>

            <div class="input-group">
                <label>Room Number</label>
                <input type="number" name="room_number" placeholder="Enter Room number" required>
            </div>

            <div class="input-group">
                <label>Student Mobile Number</label>
                <input type="tel" name="student_mobile" placeholder="Enter your mobile number" maxlength="10" pattern="\d{10}"
                    title="Mobile number must be 10 digits" required>
            </div>

    <!--Parent's details-->
            <div class="input-group">
                <label>Father's name</label>
                <input type="text" name="father_name" placeholder="Enter Father's name" required>
            </div>

            <div class="input-group">
                <label>Mother's name</label>
                <input type="text" name="mother_name" placeholder="Enter Mother's name" required>
            </div>

            <div class="input-group">
                <label>Parent's Mobile Number</label>
                <input type="tel" name="parent_mobile"  placeholder="Enter Parent's mobile number" maxlength="10" pattern="\d{10}"
                    title="Mobile number must be 10 digits" required>
            </div>

            <div class="input-group">
                <label>Parent's email ID</label>
                <input type="email" name="parent_email" placeholder="Enter Parent's email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" minlength="6" maxlength="8" placeholder="Create password" required>
            </div>

            <button type="submit">Register</button>
        </form>

<!--for log-in-->
        <div class="login-link">
            Already have an account?
            <a href="{% url 'student_login' %}">Login</a>
        </div>

    </div>

</body>
</html>
